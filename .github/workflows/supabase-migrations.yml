name: Supabase migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations.yml"

jobs:
  apply:
    name: Apply database migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate backend configuration
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN secret" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD secret" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID repository variable" && exit 1)
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - name: Push migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
